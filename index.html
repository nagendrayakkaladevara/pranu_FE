<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        var stored = localStorage.getItem('ecqes-theme');
        var resolved = stored === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : (stored || 'dark');
        if (resolved === 'light') document.documentElement.classList.add('light');
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="VECQES — Vishnu Engineering College Quiz Examination System. A centralized platform for engineering colleges to conduct quiz-based examinations with role-based access, automatic evaluation, and performance analytics." />
    <meta name="theme-color" content="#00E5A0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>VECQES — Quiz Examination System</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
